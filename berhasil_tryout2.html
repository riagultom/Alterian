<!DOCTYPE html>

<title>Pembayaran Berhasil</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7fb;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#fff;
    padding:18px 30px;
    border-bottom:1px solid #ddd;
}

.logo{
    font-size:28px;
    color:#1F3A8F;
    font-weight:bold;
}

.container{
    max-width:700px;
    margin:50px auto;
}

.card{
    background:#fff;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.icon{
    width:110px;
    height:110px;
    margin:auto;
    border-radius:50%;
    background:#4CAF50;
    color:white;
    font-size:60px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card h1{
    color:#4CAF50;
    margin-top:20px;
    margin-bottom:15px;
}

.card p{
    color:#555;
    line-height:1.7;
    font-size:16px;
}

.detail{
    margin-top:30px;
    background:#f8f8f8;
    border-radius:12px;
    padding:20px;
    text-align:left;
}

.detail p{
    margin:10px 0;
}

.button-group{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:30px;
}

.btn{
    padding:12px 22px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.primary{
    background:#1F3A8F;
    color:white;
}

.primary:hover{
    background:#16306f;
}

.secondary{
    background:#FFD54F;
    color:#333;
}

.secondary:hover{
    background:#FFC107;
}

.secondary{
