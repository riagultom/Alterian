<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembayaran Try Out</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7fb;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#fff;
    padding:18px 30px;
    border-bottom:1px solid #ddd;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#1F3A8F;
}

.back-btn{
    background:#1F3A8F;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
}

.back-btn:hover{
    background:#16306f;
}

.container{
    max-width:700px;
    margin:40px auto;
}

.card{
    background:white;
    border-radius:18px;
    padding:30px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h1{
    color:#1F3A8F;
    margin-bottom:25px;
    text-align:center;
}

.box{
    background:#f8f8f8;
    padding:18px;
    border-radius:10px;
    margin-bottom:18px;
}

.box p{
    margin:8px 0;
    font-size:17px;
}

.coin{
    color:#f4a000;
    font-weight:bold;
}

.total{
    background:#EEF3FF;
    border-left:5px solid #1F3A8F;
    padding:18px;
    border-radius:10px;
    margin:25px 0;
}

.total h2{
    color:#1F3A8F;
}

.pay-btn{
    width:100%;
    background:#1F3A8F;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    font-size:17px;
    cursor:pointer;
}

.pay-btn:hover{
    background:#16306f;
}
.header-right{
    display:flex;
    align-items:center;
    gap:18px;
}

.saldo{
    display:flex;
    align-items:center;
    gap:12px;
    background:#FFF2CC;
    padding:10px 18px;
    border-radius:15px;
    border:1px solid #FFD15C;
}

.saldo img{
    width:45px;
    height:45px;
}

.saldo-text small{
    display:block;
    color:#666;
    font-size:12px;
}

.saldo-text h3{
    margin:0;
    color:#1F3A8F;
}

.topup-btn{
    background:#1F3A8F;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

.topup-btn:hover{
    background:#16306f;
}
/* ================= TEMA ORANGE ELEGAN ================= */

body{
    background:#FAF7F2;
}

/* Header */
header{
    background:#fff;
    border-bottom:1px solid #D9B98F;
}

/* Logo */
.logo{
    color:#C96A16;
}

/* Tombol Kembali */
.back-btn{
    background:#C96A16;
    color:#fff;
}

.back-btn:hover{
    background:#A55410;
}

/* Card */
.card{
    border:1px solid #E6D3B8;
}

.card h1{
    color:#C96A16;
}

/* Box */
.box{
    background:#F8F3EC;
}

/* Coin */
.coin{
    color:#D17A22;
}

/* Total Pembayaran */
.total{
    background:#F8EFE2;
    border-left:5px solid #C96A16;
}

.total h2{
    color:#C96A16;
}

/* Tombol Bayar */
.pay-btn{
    background:#C96A16;
    color:#fff;
}

.pay-btn:hover{
    background:#A55410;
}

/* Saldo */
.saldo{
    background:#F3E5D0;
    border:1px solid #D9B98F;
}

.saldo-text h3{
    color:#C96A16;
}

/* Tombol Top Up */
.topup-btn{
    background:#C96A16;
    color:#fff;
}

.topup-btn:hover{
    background:#A55410;
}
</style>

</head>
<body>

<header>

    <div class="logo">
        Alterian
    </div>

    <div class="header-right">

        <div class="saldo">

            <img src="coin.png" alt="Coin">

            <div class="saldo-text">
                <small>Tesseract</small>
                <h3>200</h3>
            </div>

            <button class="topup-btn"
                    onclick="location.href='topup.html'">
                + Top Up
            </button>

        </div>

        <button class="back-btn"
                onclick="location.href='tryout.html'">
            ← Kembali
        </button>

    </div>

</header>

<div class="container">

<div class="card">

<h1>Pembayaran Try Out</h1>

<div class="box">

<p><strong>Nama Try Out</strong></p>

<p>TRY OUT SSU ITB 2026</p>

</div>

<div class="box">

<p><strong>Harga</strong></p>

<p class="coin">🪙 150 Tesseract</p>

</div>

<div class="box">

<p><strong>Saldo Tesseract Kamu</strong></p>

<p class="coin">🪙 200 Tesseract</p>

</div>

<div class="total">

<h2>Total Dibayar</h2>

<h2>🪙 150 Tesseract</h2>

<p>Sisa saldo setelah pembayaran: <strong>50 Tesseract</strong></p>

</div>

<button class="pay-btn"
onclick="location.href='berhasil_tryout.html'">

Bayar dengan Tesseract

</button>

</div>

</div>

</body>
</html>
