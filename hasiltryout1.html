<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hasil Try Out</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7fb;
}

/* Header */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#fff;
    padding:18px 30px;
    border-bottom:1px solid #ddd;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#1F3A8F;
}

.back-btn{
    background:#1F3A8F;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
}

.back-btn:hover{
    background:#16306f;
}

/* Container */

.container{
    max-width:850px;
    margin:40px auto;
}

.card{
    background:white;
    border-radius:18px;
    padding:35px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

/* Judul */

.success{
    text-align:center;
    margin-bottom:30px;
}

.success h1{
    color:#1F3A8F;
    margin-top:15px;
}

.success p{
    color:#666;
}

.icon{
    width:100px;
    height:100px;
    background:#4CAF50;
    color:white;
    border-radius:50%;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
}

/* Nilai */

.nilai{
    text-align:center;
    background:#EEF3FF;
    padding:25px;
    border-radius:15px;
    margin-bottom:30px;
}

.nilai h2{
    color:#1F3A8F;
}

.nilai h1{
    font-size:60px;
    color:#1F3A8F;
    margin:10px 0;
}

/* Statistik */

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.box{
    background:#fff;
    border:1px solid #ddd;
    border-radius:12px;
    padding:20px;
    text-align:center;
}

.box h3{
    color:#1F3A8F;
    margin-bottom:10px;
}

.box p{
    font-size:22px;
    font-weight:bold;
}

/* Tombol */

.button-group{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:35px;
}

button{
    border:none;
    padding:13px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.primary{
    background:#1F3A8F;
    color:white;
}

.primary:hover{
    background:#16306f;
}

.secondary{
    background:#FFD54F;
    color:#333;
}

.secondary:hover{
    background:#FFC107;
}
/* ================= TEMA ORANGE ELEGAN ================= */

body{
    background:#FAF7F2;
}

/* Header */
header{
    background:#fff;
    border-bottom:1px solid #D9B98F;
}

/* Logo */
.logo{
    color:#C96A16;
}

/* Tombol Kembali */
.back-btn{
    background:#C96A16;
    color:#fff;
}

.back-btn:hover{
    background:#A55410;
}

/* Card */
.card{
    border:1px solid #E6D3B8;
}

/* Bagian Sukses */
.success h1{
    color:#C96A16;
}

.icon{
    background:#C96A16;
    color:#fff;
}

/* Nilai */
.nilai{
    background:#F8F3EC;
    border:1px solid #E6D3B8;
}

.nilai h2,
.nilai h1{
    color:#C96A16;
}

/* Statistik */
.box{
    border:1px solid #E6D3B8;
    background:#fff;
}

.box h3{
    color:#C96A16;
}

.box p{
    color:#6B3E10;
}

/* Tombol */
.primary{
    background:#C96A16;
    color:#fff;
}

.primary:hover{
    background:#A55410;
}

.secondary{
    background:#E8D3B0;
    color:#6B3E10;
}

.secondary:hover{
    background:#D9B98F;
}
</style>

</head>

<body>

<header>

<div class="logo">
Altera
</div>

<button class="back-btn"
onclick="location.href='tryout.html'">

← Kembali

</button>

</header>

<div class="container">

<div class="card">

<div class="success">

<div class="icon">
✔
</div>

<h1>Selamat!</h1>

<p>Kamu telah menyelesaikan Try Out SIMAK UI 2026.</p>

</div>

<div class="nilai">

<h2>Nilai Akhir</h2>

<h1>100</h1>

<p>Amat Baik 🎉</p>

</div>

<div class="grid">

<div class="box">
<h3>Benar</h3>
<p>5</p>
</div>

<div class="box">
<h3>Salah</h3>
<p>0</p>
</div>

<div class="box">
<h3>Kosong</h3>
<p>0</p>
</div>

<div class="box">
<h3>Waktu</h3>
<p>1 menit</p>
</div>

</div>

<div class="button-group">



<button class="primary"
onclick="location.href='tryout.html'">

Kembali ke Try Out

</button>

</div>

</div>

</div>

</body>
</html>
