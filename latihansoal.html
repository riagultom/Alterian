<style>
body{margin:0;font-family:Arial;background:#f7f8fb}
header{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:18px 30px;border-bottom:1px solid #ddd}
nav a{margin:0 8px;text-decoration:none;color:#333;padding:8px 12px;border-radius:6px}
nav a.active{background:#1F3A8F;color:#fff}
main{

.card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:20px;margin-bottom:15px}
button{background:#1F3A8F;color:#fff;border:none;padding:10px 16px;border-radius:6px;cursor:pointer}
.profile-menu{
    position:relative;
    display:inline-block;
}

.profile-btn{
    background:#1F3A8F;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.profile-btn:hover{
    background:#16306f;
}

.dropdown{
    display:none;
    position:absolute;
    right:0;
    top:45px;
    background:white;
    min-width:220px;
    border:1px solid #ddd;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    overflow:hidden;
    z-index:100;
}

.dropdown a{
    display:block;
    padding:12px 15px;
    text-decoration:none;
    color:#333;
}

.dropdown a:hover{
    background:#f2f2f2;
}

.show{
    display:block;
}
