<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mulai Try Out</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7fb;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#fff;
    padding:18px 30px;
    border-bottom:1px solid #ddd;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#1F3A8F;
}

.timer{
    background:#1F3A8F;
    color:white;
    padding:10px 18px;
    border-radius:10px;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:40px auto;
}

.card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.nomor{
    color:#1F3A8F;
    margin-bottom:20px;
}

.pertanyaan{
    font-size:20px;
    margin-bottom:25px;
}

.opsi{
    display:block;
    background:#f7f7f7;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    cursor:pointer;
}

.opsi:hover{
    background:#EEF3FF;
}

.button-group{
    display:flex;
    justify-content:space-between;
    margin-top:30px;
}

button{
    background:#1F3A8F;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#16306f;
}
/* ================= TEMA ORANGE ELEGAN ================= */

body{
    background:#FAF7F2;
}

/* Header */
header{
    background:#fff;
    border-bottom:1px solid #D9B98F;
}

/* Logo */
.logo{
    color:#C96A16;
}

/* Timer */
.timer{
    background:#C96A16;
    color:#fff;
}

/* Card */
.card{
    border:1px solid #E6D3B8;
}

/* Nomor Soal */
.nomor{
    color:#C96A16;
}

/* Opsi Jawaban */
.opsi{
    background:#F8F3EC;
    border:1px solid #E6D3B8;
}

.opsi:hover{
    background:#F3E5D0;
    border-color:#C96A16;
}

/* Tombol */
button{
    background:#C96A16;
    color:#fff;
}

button:hover{
    background:#A55410;
}

</style>

</head>

<body>

<header>

<div class="logo">
Alterian
</div>



</header>

<div class="container">

<div class="card">

<h2 class="nomor">
Soal 1 dari 5
</h2>

<p class="pertanyaan">

Jika 2x+3=11, maka nilai x adalah ...

<input type="radio" name="jawaban">

<label class="opsi">

<label class="opsi">
<input type="radio" name="jawaban">

</label>

<label class="opsi">
<input type="radio" name="jawaban">
D. 5
</label>

<label class="opsi">
<input type="radio" name="jawaban">

</label>

<div class="button-group">

<button onclick="history.back()">
← Sebelumnya
</button>
<button class="btn primary"
onclick="location.href='soal7.html'">

</button>


</div>

</div>

</div>

</body>
</html>
