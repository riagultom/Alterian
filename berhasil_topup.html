<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up Berhasil</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f7fb;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#fff;
    padding:18px 30px;
    border-bottom:1px solid #ddd;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#1F3A8F;
}

.container{
    max-width:700px;
    margin:60px auto;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:20px;
    padding:40px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.success{
    width:120px;
    height:120px;
    margin:auto;
    border-radius:50%;
    background:#4CAF50;
    color:white;
    font-size:70px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card h1{
    margin-top:25px;
    color:#4CAF50;
}

.card p{
    margin-top:15px;
    color:#666;
    line-height:1.8;
    font-size:17px;
}

.detail{
    margin-top:30px;
    background:#f7f7f7;
    padding:20px;
    border-radius:12px;
    text-align:left;
}

.detail p{
    margin:10px 0;
}

.button-group{
    margin-top:35px;
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    padding:12px 22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
}

.primary{
    background:#1F3A8F;
    color:white;
}

.primary:hover{
    background:#16306f;
}

.secondary{
    background:#FFB300;
    color:#333;
}

.secondary:hover{
    background:#F4A000;
}
/* ================= TEMA ORANGE ELEGAN ================= */

body{
    background:#FAF7F2;
}

/* Header */
header{
    background:#fff;
    border-bottom:1px solid #D9B98F;
}

/* Logo */
.logo{
    color:#C96A16;
}

/* Card */
.card{
    border:1px solid #E6D3B8;
}

/* Ikon Sukses */
.success{
    background:#C96A16;
    color:#fff;
}

/* Judul */
.card h1{
    color:#C96A16;
}

/* Detail */
.detail{
    background:#F8F3EC;
    border:1px solid #E6D3B8;
}

/* Tombol Utama */
.primary{
    background:#C96A16;
    color:#fff;
}

.primary:hover{
    background:#A55410;
}

/* Tombol Kedua */
.secondary{
    background:#E8D3B0;
    color:#6B3E10;
}

.secondary:hover{
    background:#D9B98F;
}
</style>

</head>

<body>

<header>

<div class="logo">
Alterian
</div>

</header>

<div class="container">

<div class="card">

<div class="success">
✓
</div>

<h1>Top Up Berhasil!</h1>

<p>

Selamat! Top Up Tesseract berhasil dilakukan.
Saldo Tesseract kamu telah bertambah dan siap digunakan.

</p>

<div class="detail">

<p><strong>Nomor Transaksi :</strong> TP20260001</p>

<p><strong>Jumlah Tesseract :</strong> 200</p>

<p><strong>Total Pembayaran :</strong> Rp50.000</p>

<p><strong>Status :</strong> Berhasil</p>

</div>

<div class="button-group">

<button class="secondary"
onclick="location.href='topup.html'">

Top Up Lagi

</button>

<button class="primary"
onclick="location.href='program2.html'">

Kembali ke Program

</button>

</div>

</div>

</div>

</body>
</html>
